name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: test-runner

    steps:
      - uses: actions/checkout@v7
      - name: Install ShellCheck
        run: apt-get update && apt-get install -y shellcheck
      - name: Run ShellCheck
        run: shellcheck dotgit.sh demo/demo-note.sh
